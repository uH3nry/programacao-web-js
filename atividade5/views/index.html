<!DOCTYPE html>
<html lang="pt-br">
<head>
    <title>Agendamento</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container d-flex justify-content-center align-items-center" style="min-height: 100vh;">
<div class="col-8">

<h1 class="text-center mb-4">Agendamento</h1>

<form action="/agendamento" method="post">

<h4>Dados do paciente</h4>

<div class="row">
    <div class="col-6 mb-2">
        <input name="nome" class="form-control" placeholder="Nome">
    </div>
    <div class="col-6 mb-2">
        <input name="sobrenome" class="form-control" placeholder="Sobrenome">
    </div>

    <div class="col-6 mb-2">
        <input name="cpf" class="form-control" placeholder="CPF">
    </div>
    <div class="col-6 mb-2">
        <input type="date" name="data_nascimento" class="form-control">
    </div>

    <div class="col-6 mb-2">
        <input name="telefone" class="form-control" placeholder="Telefone">
    </div>
    <div class="col-6 mb-2">
        <input name="cep" class="form-control" placeholder="CEP">
    </div>

    <div class="col-12 mb-2">
        <input name="endereco" class="form-control" placeholder="Endereço">
    </div>
</div>

<h4 class="mt-3">Dados da consulta</h4>

<div class="row">
    <div class="col-6 mb-2">
        <input name="clinica" class="form-control" placeholder="Clínica">
    </div>
    <div class="col-6 mb-2">
        <input name="especialidade" class="form-control" placeholder="Especialidade">
    </div>

    <div class="col-6 mb-2">
        <input type="date" name="data" class="form-control">
    </div>
    <div class="col-6 mb-2">
        <input type="time" name="hora" class="form-control">
    </div>

    <div class="col-12 mb-2">
        <textarea name="observacao" class="form-control" placeholder="Observação"></textarea>
    </div>
</div>

<button type="submit" class="btn btn-primary w-100 mt-3">Enviar</button>

</form>

</div>
</div>

</body>
</html>
